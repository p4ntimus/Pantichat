<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PantiChat</title>

<style>
    * { box-sizing: border-box; }

    input, textarea, button {
        font-family: "Cinzel", serif;
    }

    body {
        margin: 0;
        background: radial-gradient(circle at center, #1a0f1f 0%, #0a060c 70%, #000 100%);
        color: #fff;
        font-family: "Cinzel", serif;
        height: 100vh;
        overflow: hidden;
        position: relative;
    }

    body::before {
        content: "";
        position: absolute;
        inset: 10px;
        border-radius: 18px;
        border: 1px solid rgba(180, 120, 255, 0.35);
        box-shadow:
            0 0 25px rgba(150, 80, 255, 0.35),
            0 0 60px rgba(80, 20, 140, 0.6);
        pointer-events: none;
    }

    .particles {
        position: absolute;
        inset: 0;
        overflow: hidden;
        z-index: 1;
        pointer-events: none;
    }

    .particle {
        position: absolute;
        width: 4px;
        height: 4px;
        background: rgba(200, 120, 255, 0.8);
        border-radius: 50%;
        animation: floatUp 6s linear infinite;
        filter: blur(1px);
    }

    @keyframes floatUp {
        0% { transform: translateY(100vh) scale(0.6); opacity: 0; }
        20% { opacity: 1; }
        100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    /* STARTSCREEN */

    #startscreen-protected {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        padding: 24px 18px;
        z-index: 20;
    }

    .start-active { display: flex; }

    .start-welcome {
        font-size: 26px;
        text-align: center;
        margin: 60px 0 20px;
        letter-spacing: 0.06em;
        line-height: 1.4;
        color: #e8d9ff;
        opacity: 0;
        animation: startFadeIn 1.5s ease-out forwards;
    }

    @keyframes startFadeIn {
        to { opacity: 1; }
    }

    .start-logo {
        font-weight: 700;
        background: linear-gradient(135deg, #ffdd88, #c28aff, #8a3cff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow:
            0 0 15px rgba(255, 220, 150, 0.8),
            0 0 30px rgba(180, 80, 255, 0.8);
    }

    /* Zentrierter Name + Glow */

    #start-nameInput {
        background: rgba(15, 8, 25, 0.9);
        border: 1px solid #6a2c8a;
        color: #fff;
        box-shadow: inset 0 0 10px #2a0c3f;
        margin-bottom: 16px;
        padding: 12px 14px;
        border-radius: 8px;

        text-align: center;
        font-size: 18px;
        letter-spacing: 0.5px;

        transition: all 0.25s ease;
    }

    #start-nameInput::placeholder {
        color: rgba(200, 160, 255, 0.45);
    }

    #start-nameInput:focus,
    #start-nameInput:not(:placeholder-shown) {
        border-color: #c28aff;
        box-shadow:
            0 0 12px #b77dff,
            0 0 22px rgba(200, 140, 255, 0.7),
            inset 0 0 12px rgba(150, 80, 255, 0.6);
        color: #ffddff;
    }

    #start-button {
        padding: 12px 14px;
        border-radius: 8px;
        background: linear-gradient(135deg, #5a1b8a, #9b4dff);
        color: white;
        border: 1px solid #b77dff;
        box-shadow:
            0 0 10px #7a2cff,
            0 0 25px rgba(150, 80, 255, 0.7);
    }

    /* FOOTER */

    #start-footer {
        margin-top: auto;
        text-align: center;
        font-size: 11px;
        color: rgba(230, 210, 255, 0.55);
        line-height: 1.4;
        padding-bottom: 2px;
        text-shadow:
            0 0 6px rgba(180, 120, 255, 0.4),
            0 0 12px rgba(80, 20, 140, 0.4);
    }

    /* VERSION */

    #version {
        text-align: center;
        font-size: 10px;
        color: rgba(200, 170, 255, 0.45);
        letter-spacing: 0.8px;
        text-shadow:
            0 0 6px rgba(150, 80, 255, 0.35),
            0 0 12px rgba(80, 20, 140, 0.35);
        margin-bottom: 6px;
    }

    /* CHAT */

    #chatScreen {
        position: absolute;
        inset: 0;
        display: none;
        flex-direction: column;
        padding: 0 12px 12px 12px;
        z-index: 5;
    }

    #chatScreen.active { display: flex; }

    #header {
        height: 52px;
        display: flex;
        align-items: center;
        padding: 0 18px;
        background: rgba(20, 10, 30, 0.65);
        border-bottom: 1px solid rgba(180, 120, 255, 0.35);
        box-shadow:
            0 0 12px rgba(150, 80, 255, 0.4),
            inset 0 0 12px rgba(80, 20, 140, 0.4);
        backdrop-filter: blur(6px);
    }

    #headerTitle {
        font-size: 20px;
        font-weight: 700;
        background: linear-gradient(135deg, #ffdd88, #c28aff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow:
            0 0 12px rgba(200, 140, 255, 0.8),
            0 0 25px rgba(255, 220, 150, 0.8);
    }

    #chat {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 0;
        padding-right: 4px;
    }

    .msg {
        padding: 10px 12px;
        background: rgba(40, 20, 60, 0.78);
        border: 1px solid #6a2ca0;
        border-radius: 10px;
        max-width: 80%;
        backdrop-filter: blur(4px);
        box-shadow: 0 0 10px #3a1455;
        font-size: 15px;
        opacity: 0;
        transform: translateY(6px);
        animation: msgIn 0.25s ease-out forwards;
    }

    .me {
        background: rgba(120, 40, 160, 0.9);
        border-color: #b86cff;
        margin-left: auto;
        box-shadow:
            0 0 12px #a84cff,
            0 0 26px rgba(190, 120, 255, 0.9);
    }

    @keyframes msgIn {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .msg span.user {
        font-weight: 600;
        color: #e0c4ff;
    }

    #inputArea {
        display: flex;
        gap: 10px;
        align-items: flex-end;
    }

    #text {
        flex: 1;
        background: rgba(20, 10, 30, 0.9);
        border: 1px solid #5a2c8a;
        color: #fff;
        box-shadow: inset 0 0 10px #2a0c3f;

        font-size: 16px;
        font-family: "Cinzel", serif;
        padding: 10px;
        border-radius: 10px;

        resize: none;
        overflow-y: hidden;
        line-height: 20px;
        min-height: 44px;
        max-height: 120px;
    }

    #send {
        min-width: 100px;
        height: 44px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 10px;
        border: none;
        color: #fff;

        background: linear-gradient(135deg, #6a1b9a, #c26dff);

        -webkit-tap-highlight-color: transparent;
        outline: none;
    }

    #send:active {
        animation: sendPulse 0.25s ease-out;
        background: linear-gradient(135deg, #6a1b9a, #c26dff);
        outline: none;
    }

    @keyframes sendPulse {
        0%   { transform: scale(1); box-shadow: 0 0 10px #c26dff; }
        50%  { transform: scale(1.08); box-shadow: 0 0 25px #e2b3ff; }
        100% { transform: scale(1); box-shadow: 0 0 10px #c26dff; }
    }

</style>
</head>

<body>

<div class="particles">
    <script>
        for (let i = 0; i < 40; i++) {
            const p = document.createElement("div");
            p.className = "particle";
            p.style.left = Math.random() * 100 + "vw";
            p.style.animationDelay = Math.random() * 6 + "s";
            p.style.opacity = Math.random();
            document.querySelector(".particles").appendChild(p);
        }
    </script>
</div>

<div id="startscreen-protected" class="start-active">
    <h2 class="start-welcome">
        Herzlich Willkommen im<br>
        <span class="start-logo">PANTICHAT</span>
    </h2>

    <input id="start-nameInput" type="text" placeholder="Dein Name">
    <button id="start-button">Starten</button>

    <div id="start-footer">
        Diese App wurde von <b>Pantimus</b> in Kooperation der Community <b>Erzengel</b> entwickelt.<br>
        © 2026 PantiCloud – Alle Rechte vorbehalten.
    </div>

    <div id="version">
        PANTICHAT • Alpha 1.0.1 — Awakening
    </div>
</div>

<div id="chatScreen">

    <div id="header">
        <div id="headerTitle">PANTICHAT</div>
    </div>

    <div id="chat"></div>

    <div id="inputArea">
        <textarea id="text" placeholder="Nachricht eingeben..." rows="1"></textarea>
        <button id="send">Senden</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCbe4dvCPu-ndp5acsryDoFwGMpj7-1ESg",
  authDomain: "panti-chat.firebaseapp.com",
  databaseURL: "https://panti-chat-default-rtdb.firebaseio.com",
  projectId: "panti-chat",
  storageBucket: "panti-chat.appspot.com",
  messagingSenderId: "912194314362",
  appId: "1:912194314362:web:094473e28ad20afca7dbc3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const chatScreen = document.getElementById("chatScreen");
const chat = document.getElementById("chat");
const text = document.getElementById("text");
const send = document.getElementById("send");

const startScreen = document.getElementById("startscreen-protected");
const startNameInput = document.getElementById("start-nameInput");
const startButton = document.getElementById("start-button");

/* USER-ID + USERNAME */

let userId = localStorage.getItem("panti_user_id") || null;
let username = localStorage.getItem("panti_username") || "";

if (!userId) {
    userId = "user_" + Math.random().toString(36).substring(2, 10);
    localStorage.setItem("panti_user_id", userId);
}

if (username) {
    startNameInput.value = username;
}

/* STARTSCREEN */

startButton.onclick = () => {
    if (startNameInput.value.trim() === "") return;

    username = startNameInput.value.trim();
    localStorage.setItem("panti_username", username);

    startScreen.style.display = "none";
    chatScreen.classList.add("active");
};

/* AUTO-RESIZE */

text.addEventListener("input", () => {
    text.style.height = "auto";
    text.style.height = text.scrollHeight + "px";
});

/* SENDEN */

send.onclick = () => {
    if (!username || username.trim() === "") {
        alert("Bitte zuerst einen Namen eingeben.");
        return;
    }

    if (text.value.trim() === "") return;

    const msg = {
        userId: userId,
        username: username,
        text: text.value,
        time: Date.now()
    };

    db.ref("messages").push(msg);
    text.value = "";
    text.style.height = "44px";
};

text.addEventListener("keypress", e => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send.onclick();
    }
});

/* EMPFANGEN */

db.ref("messages").on("child_added", snapshot => {
    const msg = snapshot.val();
    addMessage(msg.text, msg.userId === userId, msg.username);
});

function addMessage(content, isMe, user) {
    const div = document.createElement("div");
    div.className = "msg" + (isMe ? " me" : "");

    const spanUser = document.createElement("span");
    spanUser.className = "user";
    spanUser.textContent = user + ": ";

    const spanText = document.createElement("span");
    spanText.textContent = content;

    div.appendChild(spanUser);
    div.appendChild(spanText);

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
